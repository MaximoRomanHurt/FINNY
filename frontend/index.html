<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FINNY - Student Finance App</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
        }

        h1 {
            color: #333;
            margin-bottom: 30px;
            text-align: center;
            font-size: 2.5em;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #555;
            font-weight: 500;
        }

        input[type="text"],
        input[type="number"],
        select {
            width: 100%;
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 5px;
            font-size: 1em;
            transition: border-color 0.3s;
        }

        input[type="text"]:focus,
        input[type="number"]:focus,
        select:focus {
            outline: none;
            border-color: #667eea;
        }

        button {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 1em;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        button:active {
            transform: translateY(0);
        }

        .purchases-section {
            margin-top: 40px;
            padding-top: 30px;
            border-top: 2px solid #eee;
        }

        .purchases-section h2 {
            color: #333;
            margin-bottom: 20px;
            font-size: 1.5em;
        }

        .purchases-list {
            list-style: none;
        }

        .purchase-item {
            background: #f5f5f5;
            padding: 15px;
            margin-bottom: 10px;
            border-radius: 5px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-left: 4px solid #667eea;
        }

        .purchase-info {
            flex: 1;
        }

        .purchase-name {
            font-weight: 600;
            color: #333;
            font-size: 1.1em;
        }

        .purchase-category {
            font-size: 0.9em;
            color: #999;
            margin-top: 5px;
        }

        .purchase-amount {
            font-size: 1.3em;
            font-weight: 700;
            color: #667eea;
            text-align: right;
        }

        .total-section {
            background: #f0f0f0;
            padding: 20px;
            border-radius: 5px;
            text-align: center;
            margin-top: 20px;
        }

        .total-amount {
            font-size: 1.8em;
            font-weight: 700;
            color: #667eea;
        }

        .total-label {
            color: #666;
            font-size: 0.9em;
            margin-bottom: 10px;
        }

        .empty-message {
            text-align: center;
            color: #999;
            padding: 20px;
            font-style: italic;
        }

        .error {
            background: #fee;
            color: #c33;
            padding: 12px;
            border-radius: 5px;
            margin-bottom: 20px;
            border-left: 4px solid #c33;
            display: none;
        }

        .success {
            background: #efe;
            color: #3c3;
            padding: 12px;
            border-radius: 5px;
            margin-bottom: 20px;
            border-left: 4px solid #3c3;
            display: none;
        }

        .spinner {
            display: none;
            border: 3px solid #f3f3f3;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            width: 20px;
            height: 20px;
            animation: spin 1s linear infinite;
            margin: 0 auto;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .button-container {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>💰 FINNY</h1>

        <!-- Error and Success Messages -->
        <div class="error" id="error-message"></div>
        <div class="success" id="success-message"></div>

        <!-- Form Section -->
        <form id="purchase-form">
            <div class="form-group">
                <label for="purchase-name">Purchase Name</label>
                <input type="text" id="purchase-name" placeholder="e.g., Coffee, Bus ticket" required>
            </div>

            <div class="form-group">
                <label for="purchase-amount">Amount ($)</label>
                <input type="number" id="purchase-amount" step="0.01" placeholder="0.00" required>
            </div>

            <div class="form-group">
                <label for="purchase-category">Category (Optional)</label>
                <select id="purchase-category">
                    <option value="">Select a category</option>
                    <option value="Food">Food</option>
                    <option value="Transport">Transport</option>
                    <option value="Study">Study</option>
                    <option value="Other">Other</option>
                </select>
            </div>

            <button type="submit" id="submit-btn">
                <span class="button-text">Add Purchase</span>
                <div class="spinner"></div>
            </button>
        </form>

        <!-- Purchases Section -->
        <div class="purchases-section">
            <h2>Recent Purchases</h2>
            <ul class="purchases-list" id="purchases-list">
                <li class="empty-message">No purchases yet. Add one to get started!</li>
            </ul>

            <div class="total-section" id="total-section" style="display: none;">
                <div class="total-label">Total Spent</div>
                <div class="total-amount" id="total-amount">$0.00</div>
            </div>
        </div>
    </div>

    <!-- Import the app.js file -->
    <script src="app.js"></script>
</body>
</html>
